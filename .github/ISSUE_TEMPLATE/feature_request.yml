name: 功能建议
description: 提一个新功能或改进
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: 想解决的问题
      description: 你遇到的痛点 / 场景
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: 设想的方案
      description: 你希望 dao 怎么做
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: 备选 / 参考(可选)
      description: 其它做法,或 Claude Code 等的对应实现
